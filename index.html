<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lubi Electronics AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 600px; height: 80vh; background: #ffffff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #1a365d; color: #ffffff; padding: 20px; text-align: center; }
        .chat-header h1 { font-size: 1.4rem; font-weight: 600; }
        .chat-header p { font-size: 0.85rem; color: #cbd5e1; margin-top: 4px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; }
        .message.bot { background: #e2e8f0; color: #1e293b; align-self: flex-start; border-top-left-radius: 0; }
        .message.user { background: #2563eb; color: #ffffff; align-self: flex-end; border-top-right-radius: 0; }
        .chat-input-area { padding: 15px; background: #ffffff; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; outline: none; }
        .chat-input-area input:focus { border-color: #2563eb; }
        .chat-input-area button { background: #2563eb; color: white; border: none; padding: 0 20px; border-radius: 6px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
        .chat-input-area button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>Lubi Electronics</h1>
        <p>AI Support Assistant</p>
    </div>
    <div class="chat-messages" id="chat-messages">
        <div class="message bot">
            Hello! Lubi Electronics AI Assistant ma tamaru swagat chhe. Hu tamne amara products ane services vishe mahiti aapi shaku chhu. Tamaro sho prashna chhe?
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputEl = document.getElementById('user-input');
        const messageText = inputEl.value.trim();
        if (!messageText) return;

        appendMessage(messageText, 'user');
        inputEl.value = '';

 try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: messageText })
            });
            const data = await response.json();
            
            // જો સર્વર તરફથી જવાબ મળે તો જ પ્રિન્ટ કરો, નહીં તો એરર બતાવો
            if (response.ok && data.reply) {
                appendMessage(data.reply, 'bot');
            } else {
                appendMessage("Error: " + (data.detail ), 'bot');
            }
        } catch (error) {
            appendMessage('Sorry, server sathe connect thvama problem thayo chhe.', 'bot');
        }
    }

    function appendMessage(text, sender) {
        const messagesContainer = document.getElementById('chat-messages');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageDiv.innerText = text;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>
</body>
</html>
